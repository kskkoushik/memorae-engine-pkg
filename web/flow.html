<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Memorae · Flow Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d12;--panel:#12171f;--raised:#1a2130;--line:#2a3344;
  --text:#e8ecf4;--muted:#8b95a8;--dim:#5c6678;
  --accent:#6ee7b7;--accent2:#818cf8;--warn:#fbbf24;--err:#f87171;
  --r:16px;--mono:"JetBrains Mono",monospace;--sans:"Inter",system-ui,sans-serif;
  --disp:"Space Grotesk",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{
  background:
    radial-gradient(900px 500px at 90% -5%,rgba(129,140,248,.12),transparent 55%),
    radial-gradient(700px 400px at 0% 0%,rgba(110,231,183,.08),transparent 50%),
    var(--bg);
}

.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

header{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--line);
}
.logo{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-.3px}
.logo em{font-style:normal;color:var(--accent)}
.logo span{color:var(--muted);font-weight:500;font-size:15px;margin-left:8px}
.spacer{flex:1}
.nav-link{
  font-size:13px;color:var(--muted);text-decoration:none;
  border:1px solid var(--line);border-radius:999px;padding:6px 14px;transition:.15s;
}
.nav-link:hover{color:var(--accent);border-color:rgba(110,231,183,.4)}

.hero{margin-bottom:32px}
.hero h1{font-family:var(--disp);font-size:clamp(26px,4vw,36px);font-weight:600;margin-bottom:10px}
.hero p{color:var(--muted);font-size:15px;line-height:1.65;max-width:680px}

/* mode tabs */
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{
  background:var(--panel);border:1px solid var(--line);border-radius:999px;
  padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;
  font-family:var(--sans);color:var(--muted);
}
.tab:hover{border-color:var(--accent2);color:var(--text)}
.tab.active{background:rgba(110,231,183,.1);border-color:rgba(110,231,183,.45);color:var(--accent)}

/* layout */
.grid{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start}
@media(max-width:860px){.grid{grid-template-columns:1fr}}

/* step list */
.step-list{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:12px;position:sticky;top:20px;
}
.step-item{
  display:flex;gap:12px;padding:12px;border-radius:12px;cursor:pointer;
  transition:.2s;border:1px solid transparent;margin-bottom:4px;
}
.step-item:hover{background:var(--raised)}
.step-item.active{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.35)}
.step-item.done .num{background:rgba(110,231,183,.2);color:var(--accent);border-color:rgba(110,231,183,.4)}
.num{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:600;
  background:var(--raised);border:1px solid var(--line);color:var(--dim);
  transition:.3s;
}
.step-item.active .num{background:var(--accent2);color:#0a0d12;border-color:var(--accent2)}
.step-meta{min-width:0}
.step-meta b{display:block;font-size:13px;font-weight:600;margin-bottom:2px}
.step-meta small{font-size:11px;color:var(--dim);font-family:var(--mono)}

/* controls */
.controls{
  display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
}
.btn{
  flex:1;background:var(--raised);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);
  font-family:var(--sans);transition:.15s;
}
.btn:hover{border-color:var(--accent2)}
.btn.primary{background:rgba(110,231,183,.15);border-color:rgba(110,231,183,.4);color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* detail panel */
.detail{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.detail-head{
  padding:20px 24px;border-bottom:1px solid var(--line);
  background:linear-gradient(135deg,rgba(129,140,248,.08),transparent 60%);
}
.detail-head .tag{
  display:inline-block;font-family:var(--mono);font-size:10px;text-transform:uppercase;
  letter-spacing:.08em;color:var(--accent2);margin-bottom:8px;
}
.detail-head h2{font-family:var(--disp);font-size:22px;font-weight:600;margin-bottom:6px}
.detail-head p{color:var(--muted);font-size:14px;line-height:1.6}

.detail-body{padding:24px}

/* flow diagram */
.flow-diagram{
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
  gap:0;margin-bottom:28px;padding:20px;background:var(--raised);
  border-radius:14px;border:1px solid var(--line);min-height:100px;
  position:relative;overflow:hidden;
}
.flow-node{
  background:var(--panel);border:2px solid var(--line);border-radius:12px;
  padding:10px 14px;font-size:12px;font-weight:500;text-align:center;
  min-width:90px;opacity:.35;transform:scale(.92);transition:all .45s cubic-bezier(.34,1.4,.64,1);
  position:relative;z-index:1;
}
.flow-node.highlight{
  opacity:1;transform:scale(1);border-color:var(--accent);
  box-shadow:0 0 24px rgba(110,231,183,.25);background:rgba(110,231,183,.08);
}
.flow-node.done{opacity:.7;border-color:rgba(110,231,183,.35);transform:scale(.96)}
.flow-node .icon{font-size:18px;display:block;margin-bottom:4px}
.flow-arrow{
  width:32px;height:2px;background:var(--line);position:relative;flex-shrink:0;
  opacity:.3;transition:.4s;
}
.flow-arrow.active{background:var(--accent);opacity:1;box-shadow:0 0 8px var(--accent)}
.flow-arrow::after{
  content:"";position:absolute;right:-1px;top:-4px;
  border:5px solid transparent;border-left-color:inherit;
}
.flow-arrow.active::after{border-left-color:var(--accent)}

/* animated packet */
.packet{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 12px var(--accent);
  pointer-events:none;opacity:0;z-index:10;
}

/* info blocks */
.info-grid{display:grid;gap:14px;margin-bottom:20px}
.info-card{
  background:var(--raised);border:1px solid var(--line);border-radius:12px;
  padding:16px;animation:slideUp .4s ease both;
}
.info-card h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.info-card h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2)}
.info-card p,.info-card ul{font-size:13px;color:var(--muted);line-height:1.65}
.info-card ul{padding-left:18px;margin-top:6px}
.info-card li{margin-bottom:4px}
.info-card code{
  font-family:var(--mono);font-size:11px;background:var(--panel);
  padding:2px 6px;border-radius:4px;color:var(--accent);
}

.code-block{
  background:#080b10;border:1px solid var(--line);border-radius:10px;
  padding:14px 16px;font-family:var(--mono);font-size:11.5px;line-height:1.7;
  color:var(--muted);overflow-x:auto;margin-top:12px;animation:slideUp .5s ease both;
}
.code-block .kw{color:var(--accent2)}
.code-block .fn{color:var(--accent)}
.code-block .cm{color:var(--dim)}
.code-block .str{color:var(--warn)}

.progress-bar{
  height:3px;background:var(--line);border-radius:99px;margin-top:20px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:99px;transition:width .5s cubic-bezier(.34,1.2,.64,1);width:0%;
}

.legend{
  display:flex;flex-wrap:wrap;gap:12px;margin-top:24px;padding-top:20px;
  border-top:1px solid var(--line);
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
.legend-item i{width:12px;height:12px;border-radius:3px;display:inline-block}

@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes packetMove{
  0%{opacity:0;transform:translate(0,0) scale(.5)}
  10%{opacity:1;transform:scale(1)}
  90%{opacity:1}
  100%{opacity:0}
}

.fade-in{animation:fadeIn .35s ease}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">memor<em>ae</em><span>flow explorer</span></div>
    <div class="spacer"></div>
    <a href="/" class="nav-link">← Back to chat</a>
  </header>

  <section class="hero">
    <h1>How Memorae processes your memory</h1>
    <p>
      Step through the full pipeline — from raw events to a grounded answer.
      Use the controls to auto-play, or click any step to jump directly.
    </p>
  </section>

  <div class="tabs" role="tablist">
    <button class="tab active" data-mode="startup">① Startup (index build)</button>
    <button class="tab" data-mode="query">② Query (chat path)</button>
    <button class="tab" data-mode="legacy">③ Legacy (4-step engine)</button>
  </div>

  <div class="grid">
    <aside class="step-list" id="stepList"></aside>

    <main class="detail" id="detailPanel">
      <div class="detail-head" id="detailHead"></div>
      <div class="detail-body" id="detailBody"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </main>
  </div>

  <div class="legend">
    <div class="legend-item"><i style="background:var(--accent)"></i> Active step</div>
    <div class="legend-item"><i style="background:rgba(110,231,183,.4)"></i> Completed</div>
    <div class="legend-item"><i style="background:var(--accent2)"></i> Optional (RAG / LLM)</div>
    <div class="legend-item"><i style="background:var(--warn)"></i> Deterministic core</div>
  </div>
</div>

<script>
const FLOWS = {
  startup: {
    title: "Startup — building the memory index",
    subtitle: "Runs once when the server loads (Engine.from_events_file)",
    steps: [
      {
        id: "load", tag: "api.py → engine.py", title: "Load events JSON",
        module: "memorae/engine.py",
        summary: "The FastAPI server reads the events file (default: memorae_mock_events.json) and hands it to the Engine.",
        diagram: ["📄 JSON", "→", "🔧 Engine"],
        points: [
          "Triggered on first request — <code>engine()</code> lazy-loads the Engine singleton.",
          "Environment: <code>MEMORAE_EVENTS</code> overrides the file path.",
          "<code>MEMORAE_NOW</code> sets the scenario clock (default: 2026-04-13T03:00:00Z)."
        ],
        code: `<span class="cm"># engine.py — Engine.from_events_file</span>\n<span class="kw">raw</span> = json.load(open(path))\n<span class="kw">owner</span> = detect_owner(raw)\n<span class="kw">events</span> = enrich_all(raw)\n<span class="kw">mem</span> = build_memory(events, now, owner=owner)`
      },
      {
        id: "owner", tag: "enrich.py", title: "Detect owner",
        module: "memorae/enrich.py",
        summary: "Scans the event stream to infer who \"you\" are — the person whose commitments and focus we're tracking.",
        diagram: ["📄 Events", "→", "👤 Owner"],
        points: [
          "Looks at actor frequency and channel patterns across Slack, Gmail, WhatsApp, etc.",
          "Owner name is used to filter stopwords so unrelated threads don't merge."
        ]
      },
      {
        id: "enrich", tag: "enrich.py", title: "Enrich every event",
        module: "memorae/enrich.py",
        summary: "Each raw event gets structured signals derived at runtime — nothing is hand-labelled in the dataset.",
        diagram: ["📝 Raw text", "→", "🏷 Signals"],
        points: [
          "<strong>Obligation</strong> — is this something the user owes?",
          "<strong>Status</strong> — open / done / slipping / cancelled / update",
          "<strong>Deadlines</strong> — extracted & resolved via timeutil (IST-aware)",
          "<strong>Importance</strong> — exec, money, legal, consequence cues",
          "<strong>Noise score</strong> — filters coffee-machine chatter, newsletters",
          "<strong>Topic tokens</strong> — salient words for clustering"
        ]
      },
      {
        id: "memory", tag: "memory.py", title: "Build memory structures",
        module: "memorae/memory.py",
        summary: "Organises enriched events into the structures the retriever reasons over.",
        diagram: ["🏷 Signals", "→", "🧠 Memory"],
        points: [
          "<strong>EpisodicStore</strong> — every event indexed; source of truth.",
          "<strong>Near-dup groups</strong> — collapse repeated low-signal chatter.",
          "<strong>TopicCluster</strong> — events linked by distinctive anchor tokens (\"uie\", \"southridge\").",
          "<strong>Commitment ledger</strong> — one obligation tracked across mentions, with CURRENT status & due date via supersession (later signals win)."
        ],
        code: `<span class="cm"># Supersession example</span>\n<span class="str">"due Apr 10"</span> → later <span class="str">"now due Apr 13"</span>\n<span class="cm"># The Apr 13 date is authoritative</span>`
      },
      {
        id: "rag", tag: "rag.py (optional)", title: "Build RAG index",
        module: "memorae/rag.py",
        summary: "If MEMORAE_RAG=1, embeds all events into a vector index for semantic search. Skipped gracefully if unavailable.",
        diagram: ["🧠 Memory", "→", "🔍 Vectors"],
        points: [
          "Uses ChromaDB + sentence-transformers for embedding.",
          "Enables meaning-first retrieval (not just keywords).",
          "If RAG fails, the engine continues without it — tools & legacy path still work."
        ],
        optional: true
      },
      {
        id: "ready", tag: "ready", title: "Engine ready",
        module: "api.py",
        summary: "The Engine singleton is cached. Subsequent requests reuse the built memory and RAG index.",
        diagram: ["✅ Ready", "→", "🌐 /api/chat"],
        points: [
          "<code>GET /api/health</code> reports events count, RAG status, LLM status.",
          "<code>GET /api/memory</code> exposes the commitment ledger and topics.",
          "Memory is immutable for the session — all queries read from the same index."
        ]
      }
    ]
  },

  query: {
    title: "Query — semantic agent path",
    subtitle: "Primary UI flow: POST /api/chat or /api/chat/stream",
    steps: [
      {
        id: "input", tag: "web → api.py", title: "User sends a question",
        module: "api.py",
        summary: "The chat UI streams your question to POST /api/chat/stream. The server validates and routes to Engine.chat().",
        diagram: ["💬 User", "→", "🌐 API"],
        points: [
          "Example: \"What should I focus on today?\"",
          "Budget defaults to 2500 tokens of context.",
          "Empty queries return HTTP 400."
        ],
        code: `<span class="fn">engine()</span>.chat(query, budget=<span class="str">2500</span>)\n<span class="cm"># delegates to MemoryAgent</span>`
      },
      {
        id: "agent", tag: "agent.py", title: "MemoryAgent.prepare()",
        module: "memorae/agent.py",
        summary: "Builds the system prompt and initial message list with owner, scenario time, and retrieved context.",
        diagram: ["🌐 API", "→", "🤖 Agent"],
        points: [
          "System prompt from <code>prompts.py</code> — sets persona & constraints.",
          "Includes detected owner and scenario \"now\" timestamp.",
          "Prepares for tool-augmented LLM conversation."
        ]
      },
      {
        id: "semantic", tag: "semantic.py", title: "Semantic retrieval (RAG)",
        module: "memorae/semantic.py",
        summary: "If RAG is enabled, embeds the query and finds the most relevant past events by meaning — not keywords.",
        diagram: ["❓ Query", "→", "🔍 RAG", "→", "📋 Context"],
        points: [
          "<code>retrieve_semantic()</code> — query embedding → top-K hits.",
          "Filters out future-dated events (ts > now).",
          "Budget-aware packing: greedily keeps highest-scoring events under token limit.",
          "Resolves facts & attaches related commitments for selected events."
        ],
        code: `<span class="kw">hits</span> = rag_index.query(query, top_k=<span class="str">20</span>)\n<span class="kw">kept</span>, used = _pack(candidates, budget_tokens)\n<span class="cm"># funnel: rag_hits → events_selected → approx_tokens_used</span>`,
        optional: true
      },
      {
        id: "context", tag: "semantic.py", title: "Format context block",
        module: "memorae/semantic.py",
        summary: "Selected events, resolved facts, and commitment summaries are formatted into a structured block for the LLM.",
        diagram: ["📋 Events", "→", "📄 Prompt"],
        points: [
          "Each event includes timestamp, source, content, and why it was selected.",
          "Fact supersessions shown (e.g. $42k → $48.5k).",
          "If RAG is offline, the agent instructs the LLM to use tools instead."
        ]
      },
      {
        id: "tools", tag: "tools.py + agent.py", title: "Tool loop (up to 4 rounds)",
        module: "memorae/agent.py",
        summary: "The LLM can call structured tools to fetch commitments, search memory, resolve facts, or check risk — then continues.",
        diagram: ["🤖 LLM", "⇄", "🔧 Tools"],
        points: [
          "<code>search_memory</code> — semantic search on demand",
          "<code>get_open_commitments</code> — urgency-sorted ledger",
          "<code>get_at_risk_commitments</code> — overdue & imminent items",
          "<code>get_procrastination_items</code> — recurring / stalled asks",
          "<code>resolve_topic_facts</code> — supersession-aware fact timeline",
          "Skipped entirely if MEMORAE_LLM ≠ 1 or no API key."
        ],
        optional: true
      },
      {
        id: "stream", tag: "llm_client.py", title: "Generate & stream answer",
        module: "memorae/llm_client.py",
        summary: "Final answer is streamed token-by-token via SSE. Falls back to raw context if LLM is unavailable.",
        diagram: ["🤖 LLM", "→", "📡 SSE", "→", "💬 UI"],
        points: [
          "SSE events: <code>meta</code> (funnel) → <code>context</code> (events) → <code>token</code> → <code>done</code>",
          "OpenRouter API with configurable model (default: kimi-k2-thinking).",
          "Without LLM: returns formatted context as fallback text."
        ],
        code: `<span class="cm"># SSE event types</span>\n{ <span class="str">"type"</span>: <span class="str">"meta"</span>, funnel: {...} }\n{ <span class="str">"type"</span>: <span class="str">"token"</span>, text: <span class="str">"..."</span> }\n{ <span class="str">"type"</span>: <span class="str">"done"</span> }`
      },
      {
        id: "output", tag: "response", title: "Inspectable response",
        module: "agent.py",
        summary: "The full JSON record includes the answer, selected context, funnel counts, and resolved facts — so you can see the machinery.",
        diagram: ["💬 Answer", "+", "🔍 Debug"],
        points: [
          "<strong>answer</strong> — grounded, time-aware response",
          "<strong>selected_context</strong> — events with scores & reasons",
          "<strong>debug.funnel</strong> — rag_hits, events_selected, tokens used",
          "<strong>debug.resolved_facts</strong> — superseded values retired"
        ]
      }
    ]
  },

  legacy: {
    title: "Legacy — 4-step inspectable engine",
    subtitle: "POST /api/query with use_llm=false, or python run.py",
    steps: [
      {
        id: "input", tag: "engine.py", title: "Receive query",
        module: "memorae/engine.py",
        summary: "The legacy path uses Engine.answer() — a fully deterministic 4-step pipeline with optional LLM polish.",
        diagram: ["❓ Query", "→", "⚙ Engine"],
        points: [
          "Used by <code>python run.py</code> for the assessment suite.",
          "Produces the structured schema the rubric expects."
        ]
      },
      {
        id: "intent", tag: "retrieval.py", title: "Step 1 — Intent classification",
        module: "memorae/retrieval.py",
        summary: "Regex-based intent detection routes the query to the right scoring strategy.",
        diagram: ["❓ Query", "→", "🎯 Intent"],
        points: [
          "<code>focus_today</code> — \"what should I focus on\"",
          "<code>at_risk</code> — \"commitments at risk / overdue\"",
          "<code>procrastination</code> — \"putting off / avoiding\"",
          "<code>topic_summary</code> — \"summarize everything about X\"",
          "<code>generic</code> — fallback"
        ]
      },
      {
        id: "funnel", tag: "retrieval.py", title: "Step 2 — Retrieval funnel",
        module: "memorae/retrieval.py",
        summary: "A 4-stage funnel narrows the full event stream to a budget-aware context slice.",
        diagram: ["📚 All", "→", "🔽 Filter", "→", "📊 Score", "→", "📦 Pack"],
        points: [
          "<strong>Stage 0</strong> — prefilter: ts ≤ now, drop noise",
          "<strong>Stage 1</strong> — structural/lexical scoring (intent-specific signals)",
          "<strong>Stage 2</strong> — optional embedding rerank",
          "<strong>Stage 3</strong> — budget-aware packing (greedy, chronological output)",
          "Q1/Q2/Q3 score the commitment ledger; Q4 resolves topic facts with supersession."
        ],
        code: `<span class="cm"># Funnel is inspectable at every stage</span>\nfunnel: { stage0_in, stage0_out, stage1_in, ... }`
      },
      {
        id: "synth", tag: "synth.py", title: "Step 3 — Answer generation",
        module: "memorae/synth.py",
        summary: "Synthesizes a grounded answer from the selected context. Deterministic by default; LLM polish if enabled.",
        diagram: ["📦 Context", "→", "✍ Answer"],
        points: [
          "<code>synth_deterministic()</code> — template-based, no model needed.",
          "<code>synthesize()</code> — sends context + query to LLM for natural language.",
          "Answers reference specific events and commitment states."
        ]
      },
      {
        id: "reason", tag: "engine.py", title: "Step 4 — Reasoning block",
        module: "memorae/engine.py",
        summary: "Every response includes explicit reasoning: what signals were considered, why items were selected or ignored, contradictions resolved, and uncertainty.",
        diagram: ["✍ Answer", "+", "🧠 Why"],
        points: [
          "<strong>signals_considered</strong> — intent-specific signal list",
          "<strong>why_selected</strong> — per-event scorer reasons",
          "<strong>why_ignored</strong> — future events, noise, completed items",
          "<strong>contradictions_resolved</strong> — deadline moves, fact supersessions",
          "<strong>uncertainty</strong> — low-confidence deadlines, missing dates"
        ],
        code: `<span class="cm"># Assessment schema</span>\n{ query, intent, answer, selected_context,\n  reasoning: { signals, why_selected, why_ignored,\n               contradictions, uncertainty },\n  debug: { funnel, resolved_facts, now } }`
      }
    ]
  }
};

let mode = "startup";
let stepIdx = 0;
let playing = false;
let playTimer = null;

const stepList = document.getElementById("stepList");
const detailHead = document.getElementById("detailHead");
const detailBody = document.getElementById("detailBody");
const progressFill = document.getElementById("progressFill");

function currentFlow() { return FLOWS[mode]; }

function renderStepList() {
  const flow = currentFlow();
  const items = flow.steps.map((s, i) => {
    const cls = i === stepIdx ? "active" : i < stepIdx ? "done" : "";
    return `<div class="step-item ${cls}" data-idx="${i}">
      <div class="num">${i + 1}</div>
      <div class="step-meta">
        <b>${s.title}</b>
        <small>${s.module}</small>
      </div>
    </div>`;
  }).join("");

  stepList.innerHTML = items + `
    <div class="controls">
      <button class="btn" id="prevBtn" ${stepIdx === 0 ? "disabled" : ""}>← Prev</button>
      <button class="btn primary" id="playBtn">${playing ? "⏸ Pause" : "▶ Play"}</button>
      <button class="btn" id="nextBtn" ${stepIdx >= flow.steps.length - 1 ? "disabled" : ""}>Next →</button>
    </div>`;

  stepList.querySelectorAll(".step-item").forEach(el => {
    el.addEventListener("click", () => { stopPlay(); stepIdx = +el.dataset.idx; render(); });
  });
  document.getElementById("prevBtn").addEventListener("click", () => { stopPlay(); if (stepIdx > 0) { stepIdx--; render(); } });
  document.getElementById("nextBtn").addEventListener("click", () => { stopPlay(); if (stepIdx < flow.steps.length - 1) { stepIdx++; render(); } });
  document.getElementById("playBtn").addEventListener("click", togglePlay);
}

function renderDetail() {
  const flow = currentFlow();
  const step = flow.steps[stepIdx];
  const pct = ((stepIdx + 1) / flow.steps.length) * 100;

  detailHead.innerHTML = `
    <div class="tag">${step.tag}${step.optional ? " · optional" : ""}</div>
    <h2>${step.title}</h2>
    <p>${step.summary}</p>`;

  const diagramNodes = step.diagram.map((label, i) => {
    if (label === "→" || label === "⇄") {
      const active = true;
      return `<div class="flow-arrow ${active ? "active" : ""}"></div>`;
    }
    const isLast = i === step.diagram.length - 1;
    const isFirst = i === 0;
    let cls = "flow-node";
    if (isLast) cls += " highlight";
    else if (!isFirst || step.diagram[0] !== label) cls += " done";
    const icon = label.split(" ")[0];
    const text = label.slice(icon.length).trim() || label;
    return `<div class="${cls}"><span class="icon">${icon}</span>${text}</div>`;
  }).join("");

  const points = step.points.map(p => `<li>${p}</li>`).join("");
  const code = step.code ? `<pre class="code-block">${step.code}</pre>` : "";

  detailBody.innerHTML = `
    <div class="flow-diagram fade-in" id="flowDiagram">${diagramNodes}<div class="packet" id="packet"></div></div>
    <div class="info-grid">
      <div class="info-card" style="animation-delay:.05s">
        <h3><span class="dot"></span>What happens</h3>
        <ul>${points}</ul>
      </div>
      ${code ? `<div class="info-card" style="animation-delay:.12s"><h3><span class="dot" style="background:var(--warn)"></span>Code path</h3>${code}</div>` : ""}
    </div>`;

  progressFill.style.width = pct + "%";
  animatePacket();
}

function animatePacket() {
  const diagram = document.getElementById("flowDiagram");
  const packet = document.getElementById("packet");
  if (!diagram || !packet) return;
  const nodes = diagram.querySelectorAll(".flow-node");
  if (nodes.length < 2) return;

  let i = 0;
  function move() {
    if (i >= nodes.length - 1) { packet.style.opacity = "0"; return; }
    const from = nodes[i].getBoundingClientRect();
    const to = nodes[i + 1].getBoundingClientRect();
    const dr = diagram.getBoundingClientRect();
    const x0 = from.left + from.width / 2 - dr.left - 5;
    const y0 = from.top + from.height / 2 - dr.top - 5;
    const x1 = to.left + to.width / 2 - dr.left - 5;
    const y1 = to.top + to.height / 2 - dr.top - 5;
    packet.style.transition = "none";
    packet.style.opacity = "1";
    packet.style.left = x0 + "px";
    packet.style.top = y0 + "px";
    requestAnimationFrame(() => {
      packet.style.transition = "left .6s cubic-bezier(.4,0,.2,1), top .6s cubic-bezier(.4,0,.2,1), opacity .3s";
      packet.style.left = x1 + "px";
      packet.style.top = y1 + "px";
    });
    i++;
    setTimeout(move, 700);
  }
  setTimeout(move, 300);
}

function render() {
  renderStepList();
  renderDetail();
}

function stopPlay() {
  playing = false;
  clearInterval(playTimer);
  playTimer = null;
}

function togglePlay() {
  if (playing) { stopPlay(); renderStepList(); return; }
  playing = true;
  renderStepList();
  playTimer = setInterval(() => {
    const flow = currentFlow();
    if (stepIdx >= flow.steps.length - 1) { stopPlay(); renderStepList(); return; }
    stepIdx++;
    render();
  }, 3200);
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    mode = tab.dataset.mode;
    stepIdx = 0;
    stopPlay();
    render();
  });
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); stopPlay(); if (stepIdx < currentFlow().steps.length - 1) { stepIdx++; render(); } }
  if (e.key === "ArrowLeft") { stopPlay(); if (stepIdx > 0) { stepIdx--; render(); } }
});

render();
</script>
</body>
</html>
